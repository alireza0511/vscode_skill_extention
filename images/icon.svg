<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#2D2A6E"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Outer sync ring -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="5"/>

  <!-- Top sync arc with arrowhead -->
  <path d="M36 44 A38 38 0 0 1 92 44" fill="none" stroke="#A5B4FC" stroke-width="4.5" stroke-linecap="round"/>
  <polygon points="92,44 83,40 86,49" fill="#A5B4FC"/>

  <!-- Bottom sync arc with arrowhead -->
  <path d="M92 84 A38 38 0 0 1 36 84" fill="none" stroke="#A5B4FC" stroke-width="4.5" stroke-linecap="round"/>
  <polygon points="36,84 45,88 42,79" fill="#A5B4FC"/>

  <!-- Lightning bolt (skill) -->
  <path d="M72 30 L52 66 L63 66 L56 98 L78 58 L66 58 Z"
        fill="url(#bolt)" stroke="#B45309" stroke-width="1" stroke-linejoin="round"/>

  <!-- Bolt highlight -->
  <path d="M70 34 L54 64 L64 64 L58 92 L74 60 L65 60 Z"
        fill="white" opacity="0.2"/>

</svg>
